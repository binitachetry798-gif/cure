services:
  - type: web
    name: queue-cure-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        value: https://gnbhwedcjbzwwfhtbfsf.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false  # Set this manually in Render dashboard (secret)
      - key: PORT
        value: 3001
